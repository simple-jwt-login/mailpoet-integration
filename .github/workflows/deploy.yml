name: Deploy WordPress.org [WIP]

on:
  push:
    branches: '**'  # Triggers on branch pushes
    tags: '**'       # Also triggers on tag pushes
env:
  plugin_slug: "simple-jwt-login-mailpoet"

jobs:
  validate-deploy:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }} # Does not run for tags
    runs-on: ubuntu-latest
    steps:
      - name: ♻️ Checkout repository
        uses: actions/checkout@v3
      - name: 🦺 Validate Deploy to WordPress.org
        uses: simple-jwt-login/deployer@main
        with:
          plugin_folder: "/"
          exclude: "README.md, .gitignore, .github"
          slug: ${{ env.plugin_slug }}
          dry_run: true
  deploy:
    if: ${{ startsWith(github.ref, 'refs/tags/') }} # Runs only when a tag is pushed
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: ♻️ Checkout repository
        uses: actions/checkout@v3
      - name: 🦺 Validate required secrets
        run: |
          if [ -z "${{ secrets.SVN_USERNAME }}" ]; then
            echo "Missing SVN_USERNAME"
            exit 1
          fi

          if [ -z "${{ secrets.SVN_PASSWORD }}" ]; then
            echo "Missing SVN_PASSWORD"
            exit 1
          fi
      - name: 🚀 Deploy ${{ github.ref_name }} to WordPress.org
        uses: simple-jwt-login/deployer@main
        with:
          plugin_folder: "/"
          exclude: "README.md, .gitignore, .github"
          slug: ${{ env.plugin_slug }}
          # assets_folder: "wordpress.org/assets" # No assets folder present in the repository
          username: ${{secrets.SVN_USERNAME}}
          password: ${{secrets.SVN_PASSWORD}}
          tag: ${{ github.ref_name }}
          commit_message: Release plugin version ${{ github.ref_name }}
